<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fornecedores - Sistema de Gestão de Estoque</title>
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="../css/fornecedores.css" />
    <link rel="stylesheet" href="../css/app.css" />
  </head>
  <body data-page="fornecedores">
    <div class="flex h-screen bg-gray-50">
      <aside class="w-64 bg-slate-900 text-white flex flex-col">
        <div class="p-6 border-b border-slate-700">
          <h1 class="text-xl font-semibold">Sistema de Estoque</h1>
        </div>

        <nav class="flex-1 p-4">
          <ul class="space-y-2">
            <li>
              <a href="./dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-lg transition-colors text-slate-300 hover:bg-slate-800 hover:text-white">
                <svg class="lucide size-5" viewBox="0 0 24 24" aria-hidden="true">
                  <rect width="7" height="9" x="3" y="3" rx="1"></rect>
                  <rect width="7" height="5" x="14" y="3" rx="1"></rect>
                  <rect width="7" height="9" x="14" y="12" rx="1"></rect>
                  <rect width="7" height="5" x="3" y="16" rx="1"></rect>
                </svg>
                <span>Dashboard</span>
              </a>
            </li>
            <li>
              <a href="./produtos.html" class="flex items-center gap-3 px-4 py-3 rounded-lg transition-colors text-slate-300 hover:bg-slate-800 hover:text-white">
                <svg class="lucide size-5" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M11 21.73a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73z"></path>
                  <path d="M12 22V12"></path>
                  <polyline points="3.29 7 12 12 20.71 7"></polyline>
                  <path d="m7.5 4.27 9 5.15"></path>
                </svg>
                <span>Produtos</span>
              </a>
            </li>
            <li>
              <a href="./fornecedores.html" class="flex items-center gap-3 px-4 py-3 rounded-lg transition-colors bg-blue-600 text-white">
                <svg class="lucide size-5" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
                  <circle cx="9" cy="7" r="4"></circle>
                  <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
                  <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                </svg>
                <span>Fornecedores</span>
              </a>
            </li>
            <li>
              <a href="./movimentacoes.html" class="flex items-center gap-3 px-4 py-3 rounded-lg transition-colors text-slate-300 hover:bg-slate-800 hover:text-white">
                <svg class="lucide size-5" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M8 3 4 7l4 4"></path>
                  <path d="M4 7h16"></path>
                  <path d="m16 21 4-4-4-4"></path>
                  <path d="M20 17H4"></path>
                </svg>
                <span>Movimentações</span>
              </a>
            </li>
          </ul>
        </nav>

        <div class="p-4 border-t border-slate-700">
          <div class="text-xs text-slate-400">
            <p>© 2026 Sistema de Gestão</p>
          </div>
        </div>
      </aside>

      <div class="flex-1 flex flex-col overflow-hidden">
        <header class="bg-white border-b border-gray-200 px-8 py-4">
          <div class="flex items-center justify-between">
            <h2 class="text-2xl font-semibold text-gray-800">Sistema de Gestão de Estoque</h2>
            <div class="flex items-center gap-4">
              <span class="text-sm text-gray-600" data-current-date>Carregando data...</span>
            </div>
          </div>
        </header>

        <main class="flex-1 overflow-y-auto p-8">
          <div class="space-y-6">
            <div class="flex items-center justify-between">
              <h1 class="text-3xl font-semibold text-gray-900">Fornecedores</h1>
              <button id="create-supplier-button" class="inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-md text-sm font-medium transition-all disabled:pointer-events-none disabled:opacity-50 shrink-0 outline-none h-9 px-4 py-2 bg-blue-600 text-white hover:bg-blue-700">
                <svg class="lucide size-4" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M5 12h14"></path>
                  <path d="M12 5v14"></path>
                </svg>
                Cadastrar Fornecedor
              </button>
            </div>

            <div class="app-feedback" id="suppliers-feedback"></div>

            <div class="bg-card text-card-foreground flex flex-col gap-6 rounded-xl border p-6 bg-white border-gray-200 shadow-sm">
              <div class="overflow-x-auto">
                <table class="w-full">
                  <thead>
                    <tr class="border-b border-gray-200">
                      <th class="text-left py-3 px-4 text-sm font-semibold text-gray-700">Nome</th>
                      <th class="text-left py-3 px-4 text-sm font-semibold text-gray-700">Telefone</th>
                      <th class="text-left py-3 px-4 text-sm font-semibold text-gray-700">E-mail</th>
                      <th class="text-center py-3 px-4 text-sm font-semibold text-gray-700">Ações</th>
                    </tr>
                  </thead>
                  <tbody id="suppliers-table-body">
                    <tr>
                      <td colspan="4">
                        <div class="app-empty-state">
                          <strong>Carregando fornecedores</strong>
                          <span>Aguarde enquanto a API responde.</span>
                        </div>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script type="module" src="../js/main.js"></script>
  </body>
</html>
